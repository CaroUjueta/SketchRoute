{% extends 'base.html' %}
{% block title %}{% if object %}Editar{% else %}Nuevo{% endif %} proyecto — SketchRoute{% endblock %}
{% block content %}
<div class="project-form">
    <h1>{% if object %}Editar{% else %}Nuevo{% endif %} proyecto</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{% url 'project_list' %}" class="btn">Cancelar</a>
    </form>
</div>
{% endblock %}
