{% extends 'base.html' %}
{% block title %}Eliminar proyecto — SketchRoute{% endblock %}
{% block content %}
<div class="confirm-delete">
    <h1>¿Eliminar "{{ object.name }}"?</h1>
    <p>Esta acción no se puede deshacer. Se eliminarán todos los planos y datos asociados.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{% url 'project_detail' pk=object.pk %}" class="btn">Cancelar</a>
    </form>
</div>
{% endblock %}
