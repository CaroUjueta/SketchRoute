{% extends 'base.html' %}
{% block title %}Iniciar sesión — SketchRoute{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">

    <a href="{% url 'home' %}" class="auth-logo">
      <span class="auth-logo-dot"></span>SketchRoute
    </a>

    <h1>Bienvenido de nuevo</h1>
    <p class="auth-sub">Ingresá a tu cuenta para continuar</p>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Iniciar sesión</button>
    </form>

    <p class="auth-foot">
      ¿No tenés cuenta? <a href="{% url 'register' %}">Registrate gratis</a>
    </p>
  </div>
</div>
{% endblock %}
