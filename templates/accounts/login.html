{% extends 'base.html' %}
{% block title %}Iniciar sesión — SketchRoute{% endblock %}
{% block content %}
<div class="auth-form">
    <h1>Iniciar sesión</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Entrar</button>
    </form>
    <p>¿No tienes cuenta? <a href="{% url 'register' %}">Regístrate</a></p>
</div>
{% endblock %}
