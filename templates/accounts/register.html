{% extends 'base.html' %}
{% block title %}Registrarse — SketchRoute{% endblock %}
{% block content %}
<div class="auth-form">
    <h1>Crear cuenta</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Registrarse</button>
    </form>
    <p>¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión</a></p>
</div>
{% endblock %}
