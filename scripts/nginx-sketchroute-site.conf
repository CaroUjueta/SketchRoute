# Referencia — copiar a mano a /etc/nginx/sites-enabled/sketchroute en el VPS.
# limit_req_zone / limit_conn_zone y las reglas anti-escáner por UA ya están
# declaradas a nivel http{} (ver scripts/nginx-systefarma-site.conf del repo
# Systefarma) — no duplicarlas acá, solo el server{} de este subdominio.

server {
    listen 80;
    server_name rutas.systefarma.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name rutas.systefarma.com;

    ssl_certificate /etc/letsencrypt/live/rutas.systefarma.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rutas.systefarma.com/privkey.pem;

    client_max_body_size 20M;

    access_log /var/log/nginx/sketchroute-access.log;

    if ($http_user_agent ~* (l9explore|libredtail|zgrab|masscan|nikto|sqlmap|nuclei|nmap)) { return 444; }

    # ^~ para que gane sobre los location regex de abajo (mismo motivo que
    # en el server block de Systefarma: un archivo con extensión .sql/.env
    # subido a /media/ no debe caer en el bloque 444).
    location ^~ /static/ {
        alias /home/ubuntu/sketchroute/staticfiles/;
    }

    location ^~ /media/ {
        alias /home/ubuntu/sketchroute/media/;
    }

    location ~* \.(php|asp|aspx)$ { return 444; }
    location ~* /(wp-admin|wp-content|wp-includes|wp-login|xmlrpc\.php|phpmyadmin|cgi-bin)/ { return 444; }
    location ~* \.(env|git|sql|aws)($|/) { return 444; }

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
